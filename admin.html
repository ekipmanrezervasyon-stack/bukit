<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BUKit Admin</title>
</head>
<body>
  <script>
    (function () {
      var hasToken = false;
      try {
        var qs = new URLSearchParams(window.location.search);
        var tokenFromUrl = String(qs.get("at") || qs.get("token") || "").trim();
        hasToken = !!String(tokenFromUrl || localStorage.getItem("bookdeck_auth_token") || sessionStorage.getItem("bookdeck_auth_token") || "").trim();
      } catch (_eToken) {
        hasToken = false;
      }
      if (!hasToken) {
        var current = new URL(window.location.href);
        var loginUrl = new URL("/admin-login.html", window.location.href);
        var apiBase = String(current.searchParams.get("api_base") || "").trim();
        var appBase = String(current.searchParams.get("app_base") || "").trim();
        if (apiBase) loginUrl.searchParams.set("api_base", apiBase);
        if (appBase) loginUrl.searchParams.set("app_base", appBase);
        window.location.replace(loginUrl.toString());
        return;
      }
      fetch("./admin.txt", { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("Failed to load admin.txt");
          return res.text();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function (err) {
          document.body.innerHTML = "<pre style=\"font-family: sans-serif; padding: 20px; color: #b91c1c;\">Admin page load error: " +
            String((err && err.message) || err) + "</pre>";
        });
    })();
  </script>
</body>
</html>
