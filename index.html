<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="BUKit - Istanbul Bilgi University Faculty of Communication equipment and studio booking platform.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://bilgibooking.com/">
  <meta name="google-site-verification" content="">
  <title>BUKit</title>
</head>
<body>
  <script>
    (function () {
      fetch("./index.txt", { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("Failed to load index.txt");
          return res.text();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function (err) {
          document.body.innerHTML = "<pre style=\"font-family: sans-serif; padding: 20px; color: #b91c1c;\">User page load error: " +
            String((err && err.message) || err) + "</pre>";
        });
    })();
  </script>
</body>
</html>
